<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Library</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Prompt Library</h1>
      <p class="subtitle">Save and manage your AI prompts</p>
    </header>

    <section class="form-section">
      <h2>New Prompt</h2>
      <form id="prompt-form">
        <div class="field">
          <label for="title">Title</label>
          <input type="text" id="title" placeholder="e.g. Refactor function" required />
        </div>
        <div class="field">
          <label for="model">Model Name</label>
          <input type="text" id="model" placeholder="e.g. claude-sonnet-4-6" maxlength="100" required />
        </div>
        <div class="field">
          <label for="content">Prompt Content</label>
          <textarea id="content" rows="5" placeholder="Enter your prompt here..." required></textarea>
        </div>
        <div class="field field--inline">
          <label class="field--inline-label">
            <input type="checkbox" id="is-code" />
            Content is code
          </label>
        </div>
        <button type="submit">Save Prompt</button>
      </form>
    </section>

    <section class="library-section">
      <h2>Saved Prompts</h2>
      <div id="prompt-list" class="prompt-grid"></div>
      <p id="empty-state" class="empty-state">No prompts saved yet. Add one above.</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
